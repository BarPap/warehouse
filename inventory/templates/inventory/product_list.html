{% extends "base.html" %}

{% block title %}Lista produktów {% endblock %} 
{% block content %}
{% if products %}
    {% for product in products %}
        <li>{{product.name}} - ilość: {{ product.quantity }}</li>   
    {% endfor %}
    {% else %}
    <h1>"Brak produktów w magazynie."</h1>
    {% endif %}
{% endblock %}
